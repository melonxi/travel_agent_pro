# ⚠️ WARNING: Do NOT put real API keys in this file.
# Use environment variables instead. The ${VAR} syntax will be resolved at runtime.
# config.yaml
llm:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: 4096
  context_window: 200000

llm_overrides:
  phase_1_2:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
  phase_5:
    provider: "openai"
    model: "gpt-4o"

api_keys:
  google_maps: "${GOOGLE_MAPS_API_KEY}"
  amadeus_key: "${AMADEUS_API_KEY}"
  amadeus_secret: "${AMADEUS_API_SECRET}"
  openweather: "${OPENWEATHER_API_KEY}"

data_dir: "./data"
max_retries: 80
context_compression_threshold: 0.5

flyai:
  enabled: true
  cli_timeout: 30
  # api_key: ${FLYAI_API_KEY}

quality_gate:
  threshold: 3.5
  max_retries: 2

parallel_tool_execution: true

memory_extraction:
  enabled: true
  # 与主模型一致；若 gateway 支持独立轻量模型可替换为 gpt-4o-mini 等
  model: "astron-code-latest"

memory:
  enabled: true
  extraction:
    enabled: true
    model: "astron-code-latest"
    trigger: "each_turn"
    max_user_messages: 8
  policy:
    auto_save_low_risk: true
    auto_save_medium_risk: false
    require_confirmation_for_high_risk: true
  retrieval:
    core_limit: 10
    phase_limit: 8
    include_pending: false
  storage:
    backend: "json"

guardrails:
  enabled: true
  disabled_rules: []

phase5:
  parallel:
    enabled: true
    max_workers: 5
    worker_max_iterations: 30
    worker_timeout_seconds: 600
    fallback_to_serial: true
