  用户要求极短准备时间的出行。测试系统是否：
  1. guardrail 检测到紧迫日期
  2. 提醒签证/准备时间不足
  3. 不盲目搜索明天的航班
difficulty: hard
tags: [failure-analysis, date-constraint, guardrail]
messages:
