# backend/evals/golden_cases/failure-004-midway-change.yaml
id: failure-004
name: 多轮变更 — 京都改成大阪
description: |
  用户在规划中途改变目的地。测试 backtrack 机制是否能正确反映
  中途的多城市目的地变更，并将 destination 更新为新的目的地。
difficulty: hard
tags: [failure-analysis, backtrack, state-machine]
messages:
  - role: user
    content: 我想去东京和京都玩5天，预算15000
  - role: user
    content: 等等，我改主意了，京都改成大阪吧
assertions:
  - type: state_field_set
    target: destination
    value: 大阪
