<svg viewBox="0 0 1536 640" role="img" aria-label="Phase 5 并行编排宏观流程图" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
    </marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 400 28px "Instrument Serif", Georgia, serif; fill: #1c1917; }
      .node { fill: #fff; stroke: #1c1917; stroke-width: 1; }
      .store { fill: rgba(28,25,23,0.05); stroke: #57534e; stroke-width: 1; }
      .input { fill: rgba(87,83,78,0.10); stroke: #78716c; stroke-width: 1; }
      .focal { fill: rgba(181,82,58,0.08); stroke: #b5523a; stroke-width: 1.2; }
      .optional { fill: rgba(28,25,23,0.02); stroke: rgba(28,25,23,0.30); stroke-width: 1; stroke-dasharray: 4 3; }
      .name { font: 600 12px "Geist", Arial, sans-serif; fill: #1c1917; text-anchor: middle; }
      .sub { font: 400 9px "Geist Mono", ui-monospace, monospace; fill: #57534e; text-anchor: middle; }
      .tag { font: 500 8px "Geist Mono", ui-monospace, monospace; fill: #78716c; text-anchor: middle; letter-spacing: .14em; }
      .label { font: 400 8px "Geist Mono", ui-monospace, monospace; fill: #57534e; text-anchor: middle; letter-spacing: .06em; }
      .arrow { fill: none; stroke: #57534e; stroke-width: 1.2; marker-end: url(#arrow); }
      .accent-arrow { fill: none; stroke: #b5523a; stroke-width: 1.4; marker-end: url(#arrow-accent); }
      .link-arrow { fill: none; stroke: #2563eb; stroke-width: 1.2; marker-end: url(#arrow-link); }
      .dash { stroke-dasharray: 5 4; }
      .boundary { fill: rgba(28,25,23,0.02); stroke: rgba(28,25,23,0.18); stroke-width: 1; stroke-dasharray: 4 4; }
      .boundary-label { font: 500 8px "Geist Mono", ui-monospace, monospace; fill: #78716c; letter-spacing: .16em; }
    </style>
  </defs>

  <rect width="1536" height="640" fill="#faf7f2"/>
  <rect width="1536" height="640" fill="url(#dots)" opacity="0.55"/>
  <text class="title" x="48" y="56">Phase 5 Parallel Orchestration</text>

  <rect class="input" x="56" y="248" width="128" height="64" rx="6"/>
  <text class="tag" x="120" y="268">STATE</text>
  <text class="name" x="120" y="288">Phase 3</text>
  <text class="sub" x="120" y="304">phase = 5</text>

  <rect class="focal" x="240" y="248" width="156" height="64" rx="6"/>
  <text class="tag" x="318" y="268">GATE</text>
  <text class="name" x="318" y="288">入口路由</text>
  <text class="sub" x="318" y="304">should_use_parallel</text>

  <rect class="boundary" x="484" y="96" width="288" height="320" rx="8"/>
  <rect x="520" y="88" width="116" height="18" fill="#faf7f2"/>
  <text class="boundary-label" x="528" y="101">ORCHESTRATOR</text>

  <rect class="node" x="544" y="136" width="172" height="60" rx="6"/>
  <text class="tag" x="630" y="156">SPLIT</text>
  <text class="name" x="630" y="176">拆骨架</text>
  <text class="sub" x="630" y="192">DayTask[]</text>

  <rect class="store" x="544" y="236" width="172" height="60" rx="6"/>
  <text class="tag" x="630" y="256">PROMPT</text>
  <text class="name" x="630" y="276">共享前缀</text>
  <text class="sub" x="630" y="292">KV-cache friendly</text>

  <rect class="node" x="544" y="336" width="172" height="60" rx="6"/>
  <text class="tag" x="630" y="356">SPAWN</text>
  <text class="name" x="630" y="376">并发派工</text>
  <text class="sub" x="630" y="392">Semaphore(5)</text>

  <rect class="boundary" x="848" y="84" width="424" height="252" rx="8"/>
  <rect x="892" y="76" width="72" height="18" fill="#faf7f2"/>
  <text class="boundary-label" x="900" y="89">WORKERS</text>

  <rect class="node" x="888" y="136" width="96" height="96" rx="6"/>
  <text class="tag" x="936" y="156">DAY 1</text>
  <circle cx="936" cy="188" r="18" fill="rgba(181,82,58,0.08)" stroke="#b5523a"/>
  <path d="M926 188 L934 196 L948 180" fill="none" stroke="#b5523a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="sub" x="936" y="220">success</text>

  <rect class="node" x="1036" y="136" width="96" height="96" rx="6"/>
  <text class="tag" x="1084" y="156">DAY 2</text>
  <circle cx="1084" cy="188" r="18" fill="rgba(181,82,58,0.08)" stroke="#b5523a"/>
  <path d="M1074 188 L1082 196 L1096 180" fill="none" stroke="#b5523a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="sub" x="1084" y="220">success</text>

  <rect class="optional" x="1184" y="136" width="96" height="96" rx="6"/>
  <text class="tag" x="1232" y="156">DAY N</text>
  <circle cx="1232" cy="188" r="18" fill="rgba(28,25,23,0.04)" stroke="#78716c"/>
  <path d="M1224 180 L1240 196 M1240 180 L1224 196" fill="none" stroke="#78716c" stroke-width="4" stroke-linecap="round"/>
  <text class="sub" x="1232" y="220">failed</text>

  <rect class="store" x="920" y="276" width="256" height="44" rx="6"/>
  <text class="name" x="1048" y="304">DayWorkerResult[]</text>

  <rect class="focal" x="924" y="404" width="152" height="56" rx="6"/>
  <text class="tag" x="1000" y="424">CHECK</text>
  <text class="name" x="1000" y="444">全局验证</text>

  <rect class="node" x="1116" y="404" width="144" height="56" rx="6"/>
  <text class="tag" x="1188" y="424">RETRY</text>
  <text class="name" x="1188" y="444">逐天重试</text>

  <rect class="node" x="1328" y="248" width="144" height="64" rx="6"/>
  <text class="tag" x="1400" y="268">STREAM</text>
  <text class="name" x="1400" y="288">SSE 前端</text>
  <text class="sub" x="1400" y="304">TEXT_DELTA / DONE</text>

  <rect class="store" x="1072" y="524" width="184" height="56" rx="6"/>
  <text class="tag" x="1164" y="544">WRITE</text>
  <text class="name" x="1164" y="564">统一写入状态</text>

  <path class="accent-arrow" d="M184 280 H240"/>
  <path class="accent-arrow" d="M396 280 C444 280 448 166 544 166"/>
  <path class="arrow" d="M630 196 V236"/>
  <path class="arrow" d="M630 296 V336"/>
  <path class="link-arrow" d="M716 366 C780 366 792 188 888 188"/>
  <path class="link-arrow" d="M716 366 C812 366 844 188 1036 188"/>
  <path class="link-arrow" d="M716 366 C852 366 920 188 1184 188"/>
  <path class="arrow dash" d="M936 232 V276"/>
  <path class="arrow dash" d="M1084 232 V276"/>
  <path class="arrow dash" d="M1232 232 C1232 260 1176 260 1176 276"/>
  <path class="arrow" d="M1048 320 V404"/>
  <path class="arrow" d="M1076 432 H1116"/>
  <path class="arrow dash" d="M1188 404 V320"/>
  <path class="arrow" d="M1000 460 C1000 536 1040 552 1072 552"/>
  <path class="link-arrow" d="M1256 552 C1360 552 1400 396 1400 312"/>
  <path class="link-arrow" d="M1272 280 H1328"/>
  <path class="arrow dash" d="M1400 248 C1400 80 630 72 630 136"/>

  <rect x="272" y="340" width="92" height="14" rx="2" fill="#faf7f2"/>
  <text class="label" x="318" y="350">FIRST GEN</text>
  <rect x="784" y="196" width="72" height="14" rx="2" fill="#faf7f2"/>
  <text class="label" x="820" y="206">PARALLEL</text>
  <rect x="1276" y="560" width="76" height="14" rx="2" fill="#faf7f2"/>
  <text class="label" x="1314" y="570">YIELD</text>

  <line x1="48" y1="604" x2="1488" y2="604" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
  <text x="48" y="624" fill="#57534e" font-size="8" font-family="Geist Mono, ui-monospace, monospace" letter-spacing=".14em">LEGEND</text>
  <text x="136" y="624" fill="#57534e" font-size="9" font-family="Geist Mono, ui-monospace, monospace">coral = Phase 5 关键路由与验证</text>
  <text x="392" y="624" fill="#57534e" font-size="9" font-family="Geist Mono, ui-monospace, monospace">blue = LLM / SSE 边界通信</text>
  <text x="620" y="624" fill="#57534e" font-size="9" font-family="Geist Mono, ui-monospace, monospace">dashed = async / retry / callback</text>
</svg>
