  <text class="node-text" x="432" y="320">Yes: 进入并行模式</text>
  <rect class="node" x="342" y="420" width="180" height="48" />
  <text class="node-text" x="432" y="444">No: LLM 逐天生成</text>
  <path class="arrow" d="M432 250 V296" />
  <path class="soft-arrow" d="M520 190 C540 190 540 444 522 444" />
  <text class="label" x="462" y="280">首次生成 + 配置开启</text>
  <text class="label" x="503" y="392">已有行程/配置关闭</text>

  <rect class="zone orch" x="590" y="42" width="350" height="500" rx="18" fill="#f0fdf4" />
  <text class="zone-title" x="615" y="78">Orchestrator</text>
  <text class="zone-subtitle" x="615" y="104">纯 Python 编排：拆、派、收、验、写</text>
  <path class="arrow" d="M522 320 C555 320 555 140 590 140" />

  <rect class="node" x="622" y="130" width="135" height="46" />
  <text class="node-text" x="690" y="153">拆骨架</text>
  <rect class="node" x="787" y="130" width="120" height="46" />
  <text class="node-text" x="847" y="153">共享前缀</text>
  <path class="arrow" d="M757 153 H787" />

  <rect class="node" x="622" y="215" width="285" height="58" />
  <text class="node-text" x="765" y="236">并行 spawn N 个 Worker</text>
  <text class="small" x="765" y="255">Semaphore 控制最大并发</text>
  <path class="arrow" d="M847 176 C847 196 765 196 765 215" />

  <rect class="node" x="622" y="322" width="120" height="46" />
  <text class="node-text" x="682" y="345">收集结果</text>
  <rect class="node" x="772" y="322" width="135" height="46" />
  <text class="node-text" x="840" y="345">全局验证</text>
  <path class="arrow" d="M742 345 H772" />

  <rect class="pill" x="622" y="424" width="132" height="48" fill="#dcfce7" stroke="#16a34a" />
  <text class="node-text" x="688" y="448">排序 + 写入</text>
