<svg viewBox="0 0 1180 620" role="img" aria-label="Phase 5 并行编排宏观流程图" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-main" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155" />
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .zone { fill: #ffffff; stroke-width: 2; rx: 18; }
      .zone-title { font: 700 19px sans-serif; fill: #0f172a; }
      .zone-subtitle { font: 14px sans-serif; fill: #64748b; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .node-text { font: 14px sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 12px sans-serif; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
      .label { font: 12px sans-serif; fill: #475569; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow-main); }
      .soft-arrow { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow-soft); }
      .dash { stroke-dasharray: 6 6; }
      .phase { stroke: #7c3aed; }
      .entry { stroke: #2563eb; }
      .orch { stroke: #16a34a; }
      .worker { stroke: #f97316; }
      .write { stroke: #0f766e; }
      .danger { stroke: #dc2626; }
      .pill { rx: 999; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="620" rx="24" />

  <rect class="zone phase" x="30" y="42" width="245" height="500" rx="18" fill="#f5f3ff" />
  <text class="zone-title" x="55" y="78">Phase 3 串行对话</text>
  <text class="zone-subtitle" x="55" y="104">补齐进入 Phase 5 的门控条件</text>
  <rect class="node" x="58" y="140" width="190" height="48" />
  <text class="node-text" x="153" y="164">用户确认住宿</text>
  <rect class="node" x="58" y="218" width="190" height="48" />
  <text class="node-text" x="153" y="242">LLM 调用 set_accommodation()</text>
  <rect class="node" x="58" y="296" width="190" height="48" />
  <text class="node-text" x="153" y="320">ToolEngine 写入状态</text>
  <rect class="node" x="58" y="374" width="190" height="58" />
  <text class="node-text" x="153" y="397">PhaseRouter</text>
  <text class="small" x="153" y="416">检查 dates / skeleton / accommodation</text>
  <rect class="pill" x="73" y="462" width="160" height="44" fill="#ede9fe" stroke="#7c3aed" />
  <text class="node-text" x="153" y="484">plan.phase = 5</text>

  <path class="arrow" d="M153 188 V218" />
  <path class="arrow" d="M153 266 V296" />
  <path class="arrow" d="M153 344 V374" />
  <path class="arrow" d="M153 432 V462" />

