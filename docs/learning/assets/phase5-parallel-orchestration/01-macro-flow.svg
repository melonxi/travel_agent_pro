  <path class="arrow" d="M840 368 C840 398 688 394 688 424" />
  <path class="arrow" d="M754 448 H784" />

  <rect class="pill" x="782" y="510" width="125" height="38" fill="#fee2e2" stroke="#dc2626" />
  <text class="small" x="845" y="529">失败率 &gt; 50% 降级</text>
  <path class="soft-arrow dash" d="M840 368 C935 396 942 510 907 529" />

  <g>
    <rect class="node worker" x="605" y="205" width="62" height="58" fill="#fff7ed" />
    <text class="small" x="636" y="226">Worker</text>
    <text class="small" x="636" y="245">Day 1</text>
    <rect class="node worker" x="683" y="205" width="62" height="58" fill="#fff7ed" />
    <text class="small" x="714" y="226">Worker</text>
    <text class="small" x="714" y="245">Day 2</text>
    <rect class="node worker" x="761" y="205" width="62" height="58" fill="#fff7ed" />
    <text class="small" x="792" y="226">Worker</text>
    <text class="small" x="792" y="245">Day 3</text>
    <rect class="node worker" x="839" y="205" width="62" height="58" fill="#fff7ed" />
    <text class="small" x="870" y="226">Worker</text>
    <text class="small" x="870" y="245">Day N</text>
  </g>
  <path class="soft-arrow dash" d="M765 273 V305 C765 314 682 314 682 322" />
  <text class="label" x="628" y="300">DayWorkerResult 回收</text>

  <rect class="zone write" x="980" y="42" width="170" height="500" rx="18" fill="#f0fdfa" />
  <text class="zone-title" x="1005" y="78">主流程出口</text>
  <text class="zone-subtitle" x="1005" y="104">状态写入后推送前端</text>
  <rect class="node" x="1008" y="170" width="114" height="58" />
  <text class="node-text" x="1065" y="191">replace_all</text>
  <text class="node-text" x="1065" y="210">daily_plans()</text>
  <rect class="node" x="1008" y="282" width="114" height="58" />
  <text class="node-text" x="1065" y="303">yield</text>
  <text class="node-text" x="1065" y="322">TEXT_DELTA</text>
  <rect class="pill" x="1008" y="392" width="114" height="48" fill="#ccfbf1" stroke="#0f766e" />
  <text class="node-text" x="1065" y="416">SSE 结束</text>
  <path class="arrow" d="M907 448 C960 448 960 199 1008 199" />
  <path class="arrow" d="M1065 228 V282" />
  <path class="arrow" d="M1065 340 V392" />
</svg>