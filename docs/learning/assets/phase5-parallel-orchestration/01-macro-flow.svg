  <text class="zone-title" x="340" y="78">入口路由</text>
  <text class="zone-subtitle" x="340" y="104">AgentLoop.run 循环顶部</text>
  <path class="arrow" d="M233 484 C270 484 278 160 315 160" />
  <polygon points="432,130 520,190 432,250 344,190" fill="#ffffff" stroke="#2563eb" stroke-width="2" />
  <text class="node-text" x="432" y="180">should_use</text>
  <text class="node-text" x="432" y="200">parallel_phase5()?</text>
